<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyShield v3.0 | {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/shield.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="{{ url_for('static', filename='img/shield.svg') }}" alt="Logo" class="sidebar-logo">
            <span class="sidebar-title">KeyShield</span>
        </div>
        <nav class="nav-links">
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                <span>🏠</span> Dashboard
            </a>
            <a href="/scan" class="nav-link {% if request.path == '/scan' %}active{% endif %}">
                <span>🔍</span> Security Scan
            </a>
            <a href="/history" class="nav-link {% if request.path == '/history' %}active{% endif %}">
                <span>📜</span> Scan History
            </a>
            <a href="/settings" class="nav-link {% if request.path == '/settings' %}active{% endif %}">
                <span>⚙️</span> Configuration
            </a>
        </nav>
        <div class="sidebar-footer">
            <div style="font-weight: 700; color: var(--text-secondary);">v3.0.0</div>
            <div style="margin-top: 4px;">&copy; 2026 KeyShield</div>
        </div>
    </aside>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
